name: Deploy to Cloudflare Pages
on:
  push: { branches: [ main ] }
  workflow_dispatch:
permissions: { contents: read, deployments: write }
concurrency:
  group: "cf-pages-caboimage"
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: caboimage-astro
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci || npm install
      - run: npx astro check || true
      - run: npm run build
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: CLOUDFLARE_ACCOUNT_ID=711c2e12a6bd9cec3ec5c6a7633f147c npx -y wrangler@3 pages project create caboimage --production-branch=main 2>/dev/null || true
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "711c2e12a6bd9cec3ec5c6a7633f147c"
          workingDirectory: caboimage-astro
          command: pages deploy dist --project-name=caboimage --branch=main --commit-dirty=true
