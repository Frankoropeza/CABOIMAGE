<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabo Image — Project Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    color: #F5F0EB;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 24px;
    background: linear-gradient(to bottom, rgba(8,8,8,0.95), transparent);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #header h1 {
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #C8A97E;
    font-weight: 400;
  }

  #header span {
    font-size: 11px;
    color: #6B6B6B;
    letter-spacing: 0.1em;
  }

  #canvas { width: 100vw; height: 100vh; }

  #tooltip {
    position: fixed;
    background: rgba(20,20,20,0.95);
    border: 1px solid #2A2A2A;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 260px;
    z-index: 200;
    backdrop-filter: blur(10px);
  }

  #tooltip .tt-title {
    color: #C8A97E;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  #tooltip .tt-type {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #6B6B6B;
    margin-bottom: 8px;
  }

  #tooltip .tt-desc {
    color: #B0A99F;
    line-height: 1.5;
    font-size: 11px;
  }

  #legend {
    position: fixed;
    bottom: 24px;
    left: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;

  .legend-item {

    letter-spacing: 0.08em;
  }

  .legend-dot {

    height: 10px;
    border-radius: 50%;
  }

  #controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }

  .ctrl-btn {
    background: rgba(20,20,20,0.9);
    border: 1px solid #2A2A2A;
    color: #B0A99F;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }

  .ctrl-btn:hover {
    border-color: #C8A97E;
    color: #C8A97E;
  }

  #status {
    position: fixed;
    top: 56px;
    right: 24px;
    font-size: 10px;
    color: #3A3A3A;
    letter-spacing: 0.1em;

  }
</style>
</head>
<body>

<div id="header">
  <h1>Cabo Image — Project Knowledge Graph</h1>
  <span>caboimage.com · Astro Rebuild · 2026</span>
</div>

<div id="status">Drag to explore · Scroll to zoom · Click nodes</div>

<canvas id="canvas"></canvas>

<div id="tooltip">
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-desc" id="tt-desc"></div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#C8A97E;"></div>Núcleo de Marca</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7EB8C8;"></div>Servicios</div>

  <div class="legend-item"><div class="legend-dot" style="background:#C87E9F;"></div>SEO & Contenido</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8E7EC8;"></div>Tecnología</div>

  <button class="ctrl-btn" id="zoomOut">−</button>

</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const W = canvas.width = window.innerWidth;
const H = canvas.height = window.innerHeight;

// ─── DATA ─────────────────────────────────────────────────────────────
const COLORS = {

  page:    '#9FC87E',
  seo:     '#C87E9F',
  tech:    '#8E7EC8',
  gallery: '#C8C07E',
};

const nodes = [
  // ── NÚCLEO ──
  { id: 'caboimage', label: 'Cabo Image', type: 'brand', size: 38,
    desc: 'Marca principal. Fotógrafo profesional Miguel Ventura. Base: Los Cabos, BCS, México.', x: W/2, y: H/2, fixed: true },
  { id: 'miguel', label: 'Miguel Ventura', type: 'brand', size: 24,

  { id: 'loscabos', label: 'Los Cabos', type: 'brand', size: 20,

  // ── SERVICIOS ──
  { id: 'svc-wedding', label: 'Wedding Photography', type: 'service', size: 28,
    desc: 'Servicio principal ⭐. Cobertura completa de bodas en Los Cabos. 8 categorías narrativas.', x: W/2, y: H/2-220 },
  { id: 'svc-portrait', label: 'Portrait Photography', type: 'service', size: 18,
    desc: 'Retratos personales, de pareja y familiares. Mercado local e internacional.', x: W/2+280, y: H/2-180 },
  { id: 'svc-realestate', label: 'Real Estate', type: 'service', size: 20,
    desc: 'Fotografía inmobiliaria de lujo. Pedregal, Querencia, Palmilla. Alto potencial SEO.', x: W/2+320, y: H/2 },
  { id: 'svc-arch', label: 'Architecture', type: 'service', size: 16,

  { id: 'svc-fineart', label: 'Fine Art', type: 'service', size: 16,
    desc: 'Fotografía artística autoral. Galerías de Los Cabos.', x: W/2+120, y: H/2+260 },
  { id: 'svc-advert', label: 'Advertising', type: 'service', size: 16,
    desc: 'Imágenes para branding, marketing y publicidad de marcas en Los Cabos.', x: W/2-120, y: H/2+260 },
  { id: 'svc-travel', label: 'Commercial Travel', type: 'service', size: 16,
    desc: 'Fotografía comercial de destino. Turismo, hospitalidad, guías de viaje.', x: W/2-280, y: H/2+180 },

  // ── PÁGINAS ──
  { id: 'page-home', label: 'Homepage', type: 'page', size: 20,
    desc: 'Hero + Featured Work + Services + About + Testimonials + Instagram + CTA', x: W/2-320, y: H/2 },
  { id: 'page-about', label: 'About Page', type: 'page', size: 16,
    desc: 'Historia de Miguel Ventura, filosofía fotográfica, equipo y proceso.', x: W/2-300, y: H/2-120 },
  { id: 'page-contact', label: 'Contact', type: 'page', size: 16,
    desc: 'Formulario inteligente, WhatsApp, mapa de Los Cabos.', x: W/2-260, y: H/2+120 },
  { id: 'page-gallery', label: 'Gallery Hub', type: 'page', size: 18,

  { id: 'page-blog', label: 'Blog', type: 'page', size: 16,
    desc: 'Contenido SEO: guías de bodas en Los Cabos, venues, consejos.', x: W/2-120, y: H/2-300 },

  // ── GALERÍAS ──
  { id: 'gal-wedding', label: 'Wedding Gallery', type: 'gallery', size: 16,
    desc: 'Galería general de bodas.', x: W/2+60, y: H/2-320 },
  { id: 'gal-details', label: 'Details', type: 'gallery', size: 13,
    desc: 'Anillos, flores, decoración — macro shots.', x: W/2+160, y: H/2-280 },
  { id: 'gal-ready', label: 'Getting Ready', type: 'gallery', size: 13,
    desc: 'Preparativos pre-ceremonia de novios.', x: W/2+240, y: H/2-240 },
  { id: 'gal-ceremony', label: 'Ceremony', type: 'gallery', size: 13,
    desc: 'Votos, anillos, el beso, salida de novios.', x: W/2+300, y: H/2-120 },
  { id: 'gal-bg', label: 'Bride & Groom', type: 'gallery', size: 13,
    desc: 'Sesión de pareja durante la boda.', x: W/2-40, y: H/2-320 },
  { id: 'gal-brides', label: 'Brides', type: 'gallery', size: 13,
    desc: 'Fotografía dedicada a la novia.', x: W/2-160, y: H/2-280 },

  // ── SEO / CONTENIDO ──
  { id: 'seo-main', label: 'SEO Strategy', type: 'seo', size: 18,
    desc: 'Objetivo: Top 5 en "wedding photographer Los Cabos". Schema markup completo.', x: W/2+60, y: H/2+310 },
  { id: 'seo-schema', label: 'Schema Markup', type: 'seo', size: 14,
    desc: 'LocalBusiness, Service, Article, Review schemas para rich results.', x: W/2+160, y: H/2+290 },
  { id: 'seo-local', label: 'Local SEO', type: 'seo', size: 14,
    desc: 'Google Business Profile, citations: WeddingWire, The Knot, Junebug.', x: W/2-40, y: H/2+320 },

  // ── TECNOLOGÍA ──
  { id: 'tech-astro', label: 'Astro 4.x', type: 'tech', size: 20,
    desc: 'Framework SSG. 0 JS por default. Lighthouse > 95. Content Collections.', x: W/2-380, y: H/2-60 },
  { id: 'tech-tailwind', label: 'Tailwind CSS', type: 'tech', size: 14,
    desc: 'Utility-first CSS. Bundle mínimo. Dark theme con colores de Los Cabos.', x: W/2-400, y: H/2+60 },
  { id: 'tech-mdx', label: 'MDX + Markdown', type: 'tech', size: 14,
    desc: 'Content layer. Servicios, blog posts y galerías en archivos .md / .mdx.', x: W/2-340, y: H/2+170 },
  { id: 'tech-sharp', label: 'Sharp (WebP)', type: 'tech', size: 12,
    desc: 'Optimización automática de imágenes. WebP + AVIF. Responsive images.', x: W/2-420, y: H/2-170 },
];

const links = [
  // Núcleo
  ['caboimage', 'miguel', 0.8],
  ['caboimage', 'loscabos', 0.8],
  // Servicios → Núcleo
  ['caboimage', 'svc-wedding', 1.0],
  ['caboimage', 'svc-portrait', 0.6],
  ['caboimage', 'svc-realestate', 0.6],
  ['caboimage', 'svc-arch', 0.5],
  ['caboimage', 'svc-fineart', 0.4],
  ['caboimage', 'svc-advert', 0.4],
  ['caboimage', 'svc-travel', 0.4],
  // Páginas → Núcleo
  ['caboimage', 'page-home', 0.9],
  ['caboimage', 'page-about', 0.7],
  ['caboimage', 'page-contact', 0.7],
  ['caboimage', 'page-gallery', 0.8],
  ['caboimage', 'page-blog', 0.6],
  // Galerías → Wedding
  ['svc-wedding', 'gal-wedding', 0.7],
  ['svc-wedding', 'gal-details', 0.5],
  ['svc-wedding', 'gal-ready', 0.5],
  ['svc-wedding', 'gal-ceremony', 0.5],
  ['svc-wedding', 'gal-bg', 0.5],
  ['svc-wedding', 'gal-brides', 0.5],
  ['page-gallery', 'gal-wedding', 0.6],
  // SEO
  ['seo-main', 'svc-wedding', 0.5],
  ['seo-main', 'page-blog', 0.6],
  ['seo-main', 'seo-schema', 0.7],
  ['seo-main', 'seo-local', 0.7],
  ['seo-schema', 'page-home', 0.4],
  // Tech → Sitio
  ['tech-astro', 'page-home', 0.5],
  ['tech-astro', 'tech-tailwind', 0.8],
  ['tech-astro', 'tech-mdx', 0.8],
  ['tech-astro', 'tech-sharp', 0.7],
  ['tech-mdx', 'svc-wedding', 0.4],
  ['tech-sharp', 'page-gallery', 0.5],
  // Loscabos → Servicios
  ['loscabos', 'svc-wedding', 0.5],
  ['loscabos', 'svc-realestate', 0.4],
  ['loscabos', 'seo-local', 0.5],
  // Miguel → About
  ['miguel', 'page-about', 0.7],
];

// ─── PHYSICS ─────────────────────────────────────────────────────────
const nodeMap = {};
nodes.forEach(n => { nodeMap[n.id] = n; });

// Velocidades
nodes.forEach(n => {
  if (!n.fixed) {
    n.vx = (Math.random() - 0.5) * 0.5;
    n.vy = (Math.random() - 0.5) * 0.5;
  }
});

// ─── TRANSFORM ───────────────────────────────────────────────────────
let tx = 0, ty = 0, scale = 1;
let dragging = false, lastMx, lastMy;
let hoveredNode = null;
let selectedNode = null;

function worldToScreen(x, y) {
  return { x: x * scale + tx, y: y * scale + ty };
}
function screenToWorld(x, y) {
  return { x: (x - tx) / scale, y: (y - ty) / scale };
}

// ─── DRAW ─────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  const gridSize = 40 * scale;
  const offX = tx % gridSize;
  const offY = ty % gridSize;
  for (let x = offX; x < W; x += gridSize)
    for (let y = offY; y < H; y += gridSize) {
      ctx.beginPath();
      ctx.arc(x, y, 1, 0, Math.PI*2);
      ctx.fill();
    }

  // Links
  links.forEach(([a, b, strength]) => {
    const na = nodeMap[a], nb = nodeMap[b];
    if (!na || !nb) return;
    const pa = worldToScreen(na.x, na.y);
    const pb = worldToScreen(nb.x, nb.y);

    const isHighlighted = hoveredNode && (hoveredNode.id === a || hoveredNode.id === b);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);

    // Curved links
    const mx = (pa.x + pb.x) / 2;
    const my = (pa.y + pb.y) / 2;
    const dx = pb.x - pa.x;
    const dy = pb.y - pa.y;
    const cx = mx - dy * 0.1;
    const cy = my + dx * 0.1;
    ctx.quadraticCurveTo(cx, cy, pb.x, pb.y);

    if (isHighlighted) {
      ctx.strokeStyle = `rgba(200,169,126,${0.6 * strength})`;
      ctx.lineWidth = 1.5;
    } else {
      ctx.strokeStyle = `rgba(255,255,255,${0.06 * strength})`;
      ctx.lineWidth = 0.8;
    }
    ctx.stroke();
  });

  // Nodes
  nodes.forEach(n => {
    const { x, y } = worldToScreen(n.x, n.y);
    const r = n.size * scale;
    const isHover = hoveredNode && hoveredNode.id === n.id;
    const color = COLORS[n.type];

    // Glow
    if (isHover || n.id === 'caboimage') {
      const glowSize = isHover ? r * 2.5 : r * 2;
      const grd = ctx.createRadialGradient(x, y, r * 0.3, x, y, glowSize);
      grd.addColorStop(0, color + '40');
      grd.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(x, y, glowSize, 0, Math.PI*2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Ring
    ctx.beginPath();
    ctx.arc(x, y, r + 2, 0, Math.PI*2);
    ctx.strokeStyle = isHover ? color : color + '30';
    ctx.lineWidth = isHover ? 1.5 : 0.5;
    ctx.stroke();

    // Circle
    const grd = ctx.createRadialGradient(x - r*0.3, y - r*0.3, 0, x, y, r);
    grd.addColorStop(0, color + 'CC');
    grd.addColorStop(1, color + '55');
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Label
    const fontSize = Math.max(9, Math.min(13, n.size * 0.45)) * scale;
    if (fontSize > 7) {
      ctx.font = `${isHover ? '600' : '400'} ${fontSize}px Inter, sans-serif`;
      ctx.fillStyle = isHover ? '#FFFFFF' : '#E8E0D8';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, x, y + r + fontSize * 1.3);
    }
  });
}

// ─── PHYSICS STEP ─────────────────────────────────────────────────────
function physicsStep() {
  const damping = 0.88;
  const repulse = 18000;
  const spring = 0.012;
  const natural = 180;

  // Repulsion
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      if (a.fixed && b.fixed) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = repulse / (dist * dist);
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      if (!a.fixed) { a.vx -= fx; a.vy -= fy; }
      if (!b.fixed) { b.vx += fx; b.vy += fy; }
    }
  }

  // Springs
  links.forEach(([aid, bid, str]) => {
    const a = nodeMap[aid], b = nodeMap[bid];
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const targetDist = natural / str;
    const force = (dist - targetDist) * spring;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    if (!a.fixed) { a.vx += fx; a.vy += fy; }
    if (!b.fixed) { b.vx -= fx; b.vy -= fy; }
  });

  // Gravity toward center
  nodes.forEach(n => {
    if (!n.fixed) {
      const cx = W/2, cy = H/2;
      n.vx += (cx - n.x) * 0.0005;
      n.vy += (cy - n.y) * 0.0005;
      n.vx *= damping;
      n.vy *= damping;
      n.x += n.vx;
      n.y += n.vy;
    }
  });
}

// ─── EVENTS ──────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (dragging) {
    tx += mx - lastMx;
    ty += my - lastMy;
  }
  lastMx = mx; lastMy = my;

  const w = screenToWorld(mx, my);
  hoveredNode = null;
  for (const n of nodes) {
    const dx = n.x - w.x, dy = n.y - w.y;
    if (Math.sqrt(dx*dx+dy*dy) < n.size + 5) {
      hoveredNode = n;
      break;
    }
  }

  if (hoveredNode) {
    canvas.style.cursor = 'pointer';
    document.getElementById('tt-type').textContent = hoveredNode.type.toUpperCase();
    document.getElementById('tt-title').textContent = hoveredNode.label;
    document.getElementById('tt-desc').textContent = hoveredNode.desc;
    tooltip.style.opacity = '1';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = Math.min(e.clientY - 20, window.innerHeight - 140) + 'px';
  } else {
    canvas.style.cursor = dragging ? 'grabbing' : 'grab';
    tooltip.style.opacity = '0';
  }
});

canvas.addEventListener('mousedown', e => {
  dragging = true;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mouseup', () => {
  dragging = false;
  canvas.style.cursor = 'grab';
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.3, Math.min(3, scale * delta));
  tx = mx - (mx - tx) * (newScale / scale);
  ty = my - (my - ty) * (newScale / scale);
  scale = newScale;
}, { passive: false });

document.getElementById('zoomIn').onclick = () => { scale = Math.min(3, scale * 1.2); };
document.getElementById('zoomOut').onclick = () => { scale = Math.max(0.3, scale * 0.8); };
document.getElementById('reset').onclick = () => { tx = 0; ty = 0; scale = 1; };

// ─── LOOP ─────────────────────────────────────────────────────────────
function loop() {
  physicsStep();
  draw();
  requestAnimationFrame(loop);
}

canvas.style.cursor = 'grab';
loop();
</script>
</body>
</html>
